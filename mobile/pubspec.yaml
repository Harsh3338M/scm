name: nexgen_scm
description: NexGen Supply Chain Digital Twin — Field Operations App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^13.2.5

  # Google AI — Gemini Flash for cargo seal visual analysis
  google_generative_ai: ^0.4.3

  # Camera & Barcode scanning
  camera: ^0.11.0+1
  mobile_scanner: ^5.2.3
  image_picker: ^1.1.2

  # Offline-first storage
  sqflite: ^2.3.3
  path_provider: ^2.1.3
  path: ^1.9.0

  # Network & connectivity
  dio: ^5.4.3+1
  connectivity_plus: ^6.0.3
  internet_connection_checker_plus: ^2.4.0

  # Location / GPS
  geolocator: ^12.0.0
  permission_handler: ^11.3.1

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # UI
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  fl_chart: ^0.68.0

  # Auth
  google_sign_in: ^6.2.1
  firebase_core: ^2.31.1
  firebase_auth: ^4.19.6

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.0
  logger: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
